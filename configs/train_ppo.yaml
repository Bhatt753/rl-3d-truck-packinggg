# Maskable PPO training config.

algorithm: MaskablePPO
total_timesteps: 2_000_000
n_envs: 16
seed: 42

ppo:
  learning_rate: 3.0e-4
  n_steps: 512
  batch_size: 1024
  n_epochs: 6
  gamma: 0.995
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

policy:
  features_dim: 256
  cnn_channels: [32, 64, 64]
  mlp_hidden: [256, 256]

eval:
  freq: 50_000        # steps between eval rollouts
  n_episodes: 8
  save_best: true

logging:
  tensorboard_dir: runs
  checkpoint_dir: checkpoints
  checkpoint_freq: 200_000
