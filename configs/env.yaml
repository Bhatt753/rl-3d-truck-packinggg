# Environment configuration — truck dims, discretization, box distribution.
# Units: meters.

truck:
  length: 6.0          # along x (truck depth from rear door inward)
  width:  2.4          # along y
  height: 2.4          # along z (up)

grid:
  resolution: 0.2      # meters per cell
  # derived: cells_x = 30, cells_y = 12, cells_z = 12

queue:
  lookahead: 5         # K visible boxes the agent picks from
  total_min: 60        # episode box count range
  total_max: 120

box_distribution:
  # Each entry: (probability, [min_l, max_l], [min_w, max_w], [min_h, max_h]) in meters.
  # Rounded to grid resolution internally.
  - weight: 0.55       # small parcels
    size: [[0.2, 0.4], [0.2, 0.4], [0.2, 0.4]]
    fragile_prob: 0.05
  - weight: 0.30       # medium cartons
    size: [[0.4, 0.8], [0.3, 0.6], [0.3, 0.6]]
    fragile_prob: 0.10
  - weight: 0.12       # large cartons
    size: [[0.6, 1.2], [0.5, 0.9], [0.4, 0.8]]
    fragile_prob: 0.05
  - weight: 0.03       # pallet-sized
    size: [[1.0, 1.6], [0.8, 1.0], [0.6, 1.0]]
    fragile_prob: 0.0

reward:
  # Dense rewards are kept small so they don't drown out the terminal signal.
  utilization_step:  0.20
  support_step:      0.10
  void_penalty:      0.40
  wall_bonus:        0.05
  invalid_penalty:   1.0
  # Terminal: this is what the agent should really optimize.
  terminal_util:     25.0
  terminal_boxes:    0.02
  terminal_waste_sq: 15.0
